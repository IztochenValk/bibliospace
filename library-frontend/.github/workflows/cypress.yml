name: Cypress Tests

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: npm install

      - name: Start app
        run: npm run dev &
      
      - name: Wait for app
        run: npx wait-on http://localhost:3000

      - name: Run Cypress
        run: npx cypress run
