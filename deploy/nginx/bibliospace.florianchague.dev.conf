# ============================================================================
# nginx site config — bibliospace.florianchague.dev
# À déposer dans /etc/nginx/sites-available/ puis lier dans sites-enabled/
#
# Cette config est la version POST-certbot, c'est-à-dire après l'exécution
# de "sudo certbot --nginx -d bibliospace.florianchague.dev". Les directives
# marquées "managed by Certbot" ont été ajoutées par le plugin nginx de
# certbot et sont conservées telles quelles pour que :
#   - setup-vm.sh reste idempotent (cmp -s ne voit pas de diff)
#   - certbot puisse continuer à gérer le renouvellement automatique
#
# IMPORTANT — Premier déploiement sur une VM neuve :
#   1. Installer nginx + certbot AVANT le premier "up" du stack
#   2. Déposer une version HTTP-only de cette config (sans les blocs SSL)
#   3. Lancer "sudo certbot --nginx -d bibliospace.florianchague.dev"
#   4. Une fois le cert obtenu, basculer sur cette version HTTPS
#
# Sur une VM déjà provisionnée (notre cas), le fichier est déposé tel quel.
# ============================================================================

# BIBLIOSPACE — bloc HTTPS principal
server {
    server_name bibliospace.florianchague.dev;

    # Taille max du body : permet l'upload d'images de livres jusqu'à 5 MB
    # (cohérent avec spring.servlet.multipart.max-file-size=5MB)
    client_max_body_size 6M;

    # ----- Routes API → back Spring Boot -----
    location /api/ {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Timeouts confortables pour les opérations lourdes
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ----- Swagger UI exposé pour démonstration jury -----
    # Trois variantes de chemin pour couvrir tous les cas d'entrée :
    #   /swagger-ui/        -> les ressources statiques (JS, CSS, fonts)
    #   /swagger-ui.html    -> redirect vers /swagger-ui/index.html (springdoc)
    #   /webjars/           -> webjars utilisés par swagger-ui
    location /swagger-ui/ {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /swagger-ui.html {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webjars/ {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- Tout le reste → front Nuxt SSR -----
    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pour le HMR éventuel et les websockets futurs
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # ----- TLS (Let's Encrypt, géré par certbot) -----
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/bibliospace.florianchague.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/bibliospace.florianchague.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# ----- Redirect HTTP → HTTPS (généré par certbot) -----
server {
    if ($host = bibliospace.florianchague.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name bibliospace.florianchague.dev;
    listen 80;
    return 404; # managed by Certbot
}
