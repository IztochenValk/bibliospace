spring.application.name=library

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/library?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Pas de generation auto de schema.sql via les proprietes
# jakarta.persistence.schema-generation.* : la spec JPA n'a pas d'equivalent
# de ddl-auto=update (seulement create / drop / drop-and-create). Les
# combiner casse soit la creation des tables, soit le boot.
# Pour obtenir un schema.sql de documentation, faire ponctuellement sur la VM :
#   docker exec bibliospace-db mysqldump --no-data -uroot \
#     -p"$MYSQL_ROOT_PASSWORD" bibliospace > ~/bibliospace/data/schema.sql


# Cles RSA JWT.
# - En dev local : pas d'env var -> les cles sont chargees depuis le classpath
#   (src/main/resources/jwt/*.pem). Ces fichiers sont gitignores, chaque
#   developpeur genere ses propres cles dev avec openssl.
# - En prod : APP_JWT_PUBLIC_KEY_LOCATION et APP_JWT_PRIVATE_KEY_LOCATION
#   pointent vers file:/app/keys/*.pem, bind-monte depuis ~/bibliospace/keys
#   sur la VM. Les fichiers sont injectes par le workflow CI/CD a partir
#   des secrets GitHub APP_JWT_PUBLIC_KEY et APP_JWT_PRIVATE_KEY.
# Spring Boot resout automatiquement les prefixes classpath: et file:
# grace au type Resource dans JwtProperties.
security.jwt.public-key=${APP_JWT_PUBLIC_KEY_LOCATION:classpath:jwt/jwt-public.pem}
security.jwt.private-key=${APP_JWT_PRIVATE_KEY_LOCATION:classpath:jwt/jwt-private.pem}
security.jwt.issuer=${APP_JWT_ISSUER:library-app}
security.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:60}

app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql=INFO

# Override des mots de passe des utilisateurs du seed (bootstrap/users.seed.json)
# par role. Si laisse vide, le seeder utilise le mot de passe present dans le JSON
# (pratique en local : Admin123!, Biblio123!, User12345!).
# En production, on injecte des mots de passe forts via GitHub Secrets.
app.demo.password.admin=${APP_DEMO_PASSWORD_ADMIN:}
app.demo.password.bibliothecaire=${APP_DEMO_PASSWORD_BIBLIOTHECAIRE:}
app.demo.password.adherent=${APP_DEMO_PASSWORD_ADHERENT:}


app.uploads.livres-dir=src/main/resources/public/images/livres

app.storage.upload-dir=public/images/livres
app.storage.max-file-size-bytes=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
